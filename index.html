    function useScrollAnimation() {
      const ref = useRef(null);
      useEffect(() => {
        const el = ref.current;
        if (!el) return;
        const obs = new IntersectionObserver(([entry]) => {
          if (entry.isIntersecting) { el.classList.add('visible'); obs.unobserve(el); }
        }, { threshold: 0.1 });
        obs.observe(el);
        return () => obs.disconnect();
      }, []);
      return ref;
    }

    function useCounter(target) {
      const [count, setCount] = useState(0);
      const ref = useRef(null);
      useEffect(() => {
        const el = ref.current;
        if (!el) return;
        const obs = new IntersectionObserver(([entry]) => {
          if (entry.isIntersecting) {
            let start = 0;
            const dur = 2000;
            const step = Math.ceil(target / (dur / 16));
            const t = setInterval(() => {
              start += step;
              if (start >= target) { setCount(target); clearInterval(t); }
              else setCount(start);
            }, 16);
            obs.unobserve(el);
          }
        }, { threshold: 0.5 });
        obs.observe(el);
        return () => obs.disconnect();
      }, [target]);
      return { ref, count };
    }

        <footer className="bg-stone-950 text-white relative overflow-hidden border-t border-white/5">
          <div className="max-w-7xl mx-auto px-6 pt-16 pb-8 relative z-10">
            <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-10 mb-12">
              <div className="flex flex-col gap-5">
                <img src={'images/setting/logo.png'} alt="Uttam Poultry Farm" className="h-14 w-auto brightness-0 invert opacity-90" />
                <p className="text-stone-500/60 text-sm leading-relaxed">Welcome to Uttam Poultry Farm, where we are committed to raising high-quality poultry in a sustainable and ethical way.</p>
                <div className="flex gap-2">
                  {['facebook', 'instagram', 'youtube', 'message-circle', 'linkedin'].map((icon, i) => (
                    <a key={i} href={icon === 'linkedin' ? 'https://np.linkedin.com/in/sharan-pant-00346257' : 'https://www.facebook.com/p/Uttam-Poultry-Farm-61563612075393/'} target="_blank" className="w-9 h-9 glass-card rounded-xl flex items-center justify-center text-stone-400 hover:bg-amber-500 hover:text-stone-950 transition-all hover:scale-105 hover:border-amber-500/50">
                      <i data-lucide={icon} class="w-4 h-4"></i>
                    </a>
                  ))}
                </div>
              </div>
              <div>
                <h5 className="text-white font-semibold text-xs uppercase tracking-[0.15em] mb-5">Quick Links</h5>
                <div className="flex flex-col gap-2.5">
                  {[{ label: 'Home', href: '#home' }, { label: 'About us', href: '#about' }, { label: 'Product', href: '#products' }, { label: 'Blog', href: '#blog' }, { label: 'Service', href: '#services' }].map((link, i) => (
                    <a key={i} href={link.href} className="text-stone-500/60 hover:text-amber-400 text-sm font-medium transition-colors">{link.label}</a>
                  ))}
                </div>
              </div>
              <div>
                <h5 className="text-white font-semibold text-xs uppercase tracking-[0.15em] mb-5">What We Do</h5>
                <div className="flex flex-col gap-2.5">
                  {['Wholesale Supply of Poultry Products', 'Poultry Farm Consultancy', 'Customized Feeding Solutions', 'Training and Workshops for Farmers'].map((link, i) => (
                    <a key={i} href="#services" className="text-stone-500/60 hover:text-amber-400 text-sm font-medium transition-colors">{link}</a>
                  ))}
                </div>
              </div>
              <div>
                <h5 className="text-white font-semibold text-xs uppercase tracking-[0.15em] mb-5">Contact</h5>
                <div className="flex flex-col gap-2.5 text-sm text-stone-500/60">
                  <a href="tel:985-5059405" className="hover:text-amber-400 transition-colors flex items-center gap-2"><i data-lucide="phone" class="w-3.5 h-3.5"></i> 985-5059405,056-596469</a>
                  <a href="mailto:Uttampoultry@gmail.com" className="hover:text-amber-400 transition-colors flex items-center gap-2"><i data-lucide="mail" class="w-3.5 h-3.5"></i> Uttampoultry@gmail.com</a>
                  <p className="flex items-center gap-2"><i data-lucide="map-pin" class="w-3.5 h-3.5 shrink-0"></i> Bharatpur-03 ,Chitwan, Nepal</p>
                </div>
                <div className="mt-5">
                  <p className="text-[10px] text-stone-500/60 font-medium uppercase tracking-wider mb-2.5">Certified By:</p>
                  <div className="flex items-center gap-3">
                    <span className="text-[10px] text-stone-500/60 uppercase tracking-wider block">Government Authorized</span>
                  </div>
                </div>
              </div>
            </div>
            <div className="border-t border-white/5 pt-8 flex flex-col md:flex-row justify-between items-center gap-4">
              <p className="text-stone-600/40 text-[11px] font-medium tracking-wide">&copy; Copyright {new Date().getFullYear()} Uttam Poultary Farm. All Rights Reserved. Website Designed &amp; Developed By Ujjwal Panta.</p>
              <div className="flex items-center gap-5 text-[11px] text-stone-600/40">
                <a href="#" className="hover:text-amber-400 transition-colors">Terms &amp; Conditions</a>
                <a href="#" className="hover:text-amber-400 transition-colors">Privacy Policy</a>
                <a href="#" className="hover:text-amber-400 transition-colors">Sitemap</a>
              </div>
            </div>
          </div>
        </footer>
      );
    }

    function DealerModal({ isOpen, onClose }) {
      const [form, setForm] = useState({ owner_name: '', business_name: '', pan: '', email: '', phone: '', subject: '', address: '', city: '', region: '', postal_code: '', message: '' });
      const [submitted, setSubmitted] = useState(false);
      const handleSubmit = (e) => { e.preventDefault(); setSubmitted(true); setTimeout(() => { setSubmitted(false); onClose(); }, 2000); };
      if (!isOpen) return null;

      return (
        <div className="fixed inset-0 z-[200] flex items-center justify-center p-4 bg-black/80 backdrop-blur-xl" onClick={onClose}>
          <div className="glass-card-strong rounded-[32px] max-w-2xl w-full max-h-[90vh] overflow-y-auto shadow-2xl shadow-amber-500/5 animate-on-scroll scale-in visible border border-white/5" onClick={e => e.stopPropagation()}>
            <div className="p-8 md:p-12">
              <div className="flex justify-between items-start mb-4">
                <div>
                  <h2 className="text-2xl font-bold text-white">Partner Registration</h2>
                  <p className="text-stone-400 text-sm mt-1">Business Registration Form</p>
                </div>
                <button onClick={onClose} className="w-9 h-9 glass-card rounded-full flex items-center justify-center text-stone-400 hover:text-white hover:border-amber-500/30 transition-all hover:scale-105"><i data-lucide="x" class="w-4 h-4"></i></button>
              </div>
              <p className="text-stone-500 text-sm mb-6">Please provide all required details to register your business with us.</p>
              {submitted ? (
                <div className="flex flex-col items-center justify-center py-12 text-center">
                  <div className="w-16 h-16 bg-amber-500/20 rounded-full flex items-center justify-center mb-6 border border-amber-500/30"><i data-lucide="check-circle" class="w-8 h-8 text-amber-400"></i></div>
                  <h3 className="text-xl font-bold text-white mb-2">Application Received!</h3>
                  <p className="text-stone-400 text-sm">We will review your application and contact you soon.</p>
                </div>
              ) : (
                <form onSubmit={handleSubmit} className="grid grid-cols-1 md:grid-cols-2 gap-4">
                  <div className="md:col-span-2">
                    <label className="text-[10px] font-semibold text-stone-400 uppercase tracking-widest mb-1.5 block">Owner Name <span className="text-red-400">*</span></label>
                    <input required type="text" placeholder="Owner name" value={form.owner_name} onChange={e => setForm({...form, owner_name: e.target.value})} className="w-full px-4 py-3 bg-white/5 rounded-2xl text-white outline-none focus:ring-2 focus:ring-amber-500/40 transition-all font-medium placeholder:text-stone-500 border border-white/10 text-sm hover:border-amber-500/30" />
                  </div>
                  <div className="md:col-span-2">
                    <label className="text-[10px] font-semibold text-stone-400 uppercase tracking-widest mb-1.5 block">Business Name <span className="text-red-400">*</span></label>
                    <input required type="text" placeholder="Business name" value={form.business_name} onChange={e => setForm({...form, business_name: e.target.value})} className="w-full px-4 py-3 bg-white/5 rounded-2xl text-white outline-none focus:ring-2 focus:ring-amber-500/40 transition-all font-medium placeholder:text-stone-500 border border-white/10 text-sm hover:border-amber-500/30" />
                  </div>
                  <div>
                    <label className="text-[10px] font-semibold text-stone-400 uppercase tracking-widest mb-1.5 block">PAN <span className="text-red-400">*</span></label>
                    <input required type="text" placeholder="PAN" value={form.pan} onChange={e => setForm({...form, pan: e.target.value})} className="w-full px-4 py-3 bg-white/5 rounded-2xl text-white outline-none focus:ring-2 focus:ring-amber-500/40 transition-all font-medium placeholder:text-stone-500 border border-white/10 text-sm hover:border-amber-500/30" />
                  </div>
                  <div>
                    <label className="text-[10px] font-semibold text-stone-400 uppercase tracking-widest mb-1.5 block">Email <span className="text-red-400">*</span></label>
                    <input required type="email" placeholder="Valid email address" value={form.email} onChange={e => setForm({...form, email: e.target.value})} className="w-full px-4 py-3 bg-white/5 rounded-2xl text-white outline-none focus:ring-2 focus:ring-amber-500/40 transition-all font-medium placeholder:text-stone-500 border border-white/10 text-sm hover:border-amber-500/30" />
                  </div>
                  <div>
                    <label className="text-[10px] font-semibold text-stone-400 uppercase tracking-widest mb-1.5 block">Phone <span className="text-red-400">*</span></label>
                    <input required type="tel" placeholder="10 digit number" value={form.phone} onChange={e => setForm({...form, phone: e.target.value})} className="w-full px-4 py-3 bg-white/5 rounded-2xl text-white outline-none focus:ring-2 focus:ring-amber-500/40 transition-all font-medium placeholder:text-stone-500 border border-white/10 text-sm hover:border-amber-500/30" />
                  </div>
                  <div>
                    <label className="text-[10px] font-semibold text-stone-400 uppercase tracking-widest mb-1.5 block">Subject <span className="text-red-400">*</span></label>
                    <input required type="text" placeholder="Subject" value={form.subject} onChange={e => setForm({...form, subject: e.target.value})} className="w-full px-4 py-3 bg-white/5 rounded-2xl text-white outline-none focus:ring-2 focus:ring-amber-500/40 transition-all font-medium placeholder:text-stone-500 border border-white/10 text-sm hover:border-amber-500/30" />
                  </div>
                  <div>
                    <label className="text-[10px] font-semibold text-stone-400 uppercase tracking-widest mb-1.5 block">Address <span className="text-red-400">*</span></label>
                    <input required type="text" placeholder="Address" value={form.address} onChange={e => setForm({...form, address: e.target.value})} className="w-full px-4 py-3 bg-white/5 rounded-2xl text-white outline-none focus:ring-2 focus:ring-amber-500/40 transition-all font-medium placeholder:text-stone-500 border border-white/10 text-sm hover:border-amber-500/30" />
                  </div>
                  <div>
                    <label className="text-[10px] font-semibold text-stone-400 uppercase tracking-widest mb-1.5 block">City <span className="text-red-400">*</span></label>
                    <input required type="text" placeholder="City" value={form.city} onChange={e => setForm({...form, city: e.target.value})} className="w-full px-4 py-3 bg-white/5 rounded-2xl text-white outline-none focus:ring-2 focus:ring-amber-500/40 transition-all font-medium placeholder:text-stone-500 border border-white/10 text-sm hover:border-amber-500/30" />
                  </div>
                  <div>
                    <label className="text-[10px] font-semibold text-stone-400 uppercase tracking-widest mb-1.5 block">Region <span className="text-red-400">*</span></label>
                    <input required type="text" placeholder="Region" value={form.region} onChange={e => setForm({...form, region: e.target.value})} className="w-full px-4 py-3 bg-white/5 rounded-2xl text-white outline-none focus:ring-2 focus:ring-amber-500/40 transition-all font-medium placeholder:text-stone-500 border border-white/10 text-sm hover:border-amber-500/30" />
                  </div>
                  <div>
                    <label className="text-[10px] font-semibold text-stone-400 uppercase tracking-widest mb-1.5 block">Postal Code <span className="text-red-400">*</span></label>
                    <input required type="text" placeholder="Postal code" value={form.postal_code} onChange={e => setForm({...form, postal_code: e.target.value})} className="w-full px-4 py-3 bg-white/5 rounded-2xl text-white outline-none focus:ring-2 focus:ring-amber-500/40 transition-all font-medium placeholder:text-stone-500 border border-white/10 text-sm hover:border-amber-500/30" />
                  </div>
                  <div className="md:col-span-2">
                    <label className="text-[10px] font-semibold text-stone-400 uppercase tracking-widest mb-1.5 block">Message</label>
                    <textarea rows={4} placeholder="Your message" value={form.message} onChange={e => setForm({...form, message: e.target.value})} className="w-full px-4 py-3 bg-white/5 rounded-2xl text-white outline-none focus:ring-2 focus:ring-amber-500/40 transition-all font-medium placeholder:text-stone-500 border border-white/10 text-sm resize-none hover:border-amber-500/30" />
                  </div>
                  <div className="md:col-span-2">
                    <button type="submit" className="w-full py-3.5 bg-gradient-to-r from-amber-500 to-amber-600 hover:from-amber-400 hover:to-amber-500 text-stone-950 font-bold rounded-full transition-all duration-300 hover:scale-[1.02] active:scale-95 shadow-lg shadow-amber-500/20 flex items-center justify-center gap-2 group text-sm btn-shine">
                      Submit Application <i data-lucide="send" class="w-4 h-4 group-hover:translate-x-1 group-hover:-translate-y-1 transition-transform"></i>
                    </button>
                  </div>
                </form>
              )}
            </div>
          </div>
        </div>
      );
    }

    function SearchPopup({ isOpen, onClose }) {
      const [query, setQuery] = useState('');
      useEffect(() => {
        if (isOpen) setTimeout(() => document.getElementById('search-input')?.focus(), 100);
      }, [isOpen]);
      if (!isOpen) return null;
      return (
        <div className={'fixed inset-0 z-[300] flex items-center justify-center bg-black/80 backdrop-blur-xl transition-all duration-400 ' + (isOpen ? 'opacity-100 visible' : 'opacity-0 invisible')} onClick={onClose}>
          <div className="w-full max-w-2xl mx-4" onClick={e => e.stopPropagation()}>
            <div className="glass-card rounded-[32px] p-6 shadow-2xl shadow-amber-500/5 border border-white/5">
              <div className="flex items-center gap-3 mb-4">
                <input id="search-input" type="text" placeholder="What are you looking for?" value={query} onChange={e => setQuery(e.target.value)} className="flex-1 px-5 py-3.5 bg-white/5 rounded-2xl text-white outline-none focus:ring-2 focus:ring-amber-500/40 transition-all font-medium placeholder:text-stone-500 border border-white/10 text-base" />
                <button onClick={onClose} className="w-11 h-11 glass-card rounded-full flex items-center justify-center text-stone-400 hover:text-white hover:border-amber-500/30 transition-all"><i data-lucide="x" class="w-4 h-4"></i></button>
              </div>
              <button className="w-full py-3.5 bg-gradient-to-r from-amber-500 to-amber-600 hover:from-amber-400 hover:to-amber-500 text-stone-950 font-bold rounded-full transition-all duration-300 flex items-center justify-center gap-2 group text-sm btn-shine">
                <i data-lucide="search" class="w-4 h-4"></i> Search
              </button>
            </div>
          </div>
        </div>
      );
    }

    function App() {
      const [dealerOpen, setDealerOpen] = useState(false);
      const [searchOpen, setSearchOpen] = useState(false);

      useEffect(() => {
        if (typeof lucide !== 'undefined') lucide.createIcons();
      });

      useEffect(() => {
        const t = setTimeout(() => { if (typeof lucide !== 'undefined') lucide.createIcons(); }, 50);
        return () => clearTimeout(t);
      }, [dealerOpen, searchOpen]);

      return (
        <div className="min-h-screen bg-[#0c0a0e] text-stone-100 scroll-smooth">
          <Navbar onDealerClick={() => setDealerOpen(true)} onSearchClick={() => setSearchOpen(true)} />
          <Hero />
          <AboutSection />
          <ProductsSection />
          <ServicesSection />
          <CEOSection />
          <TeamSection />
          <GallerySection />
          <TestimonialsSection />
          <BlogSection />
          <FAQSection />
          <ContactSection />
          <CTABanner />
          <Footer />
          <DealerModal isOpen={dealerOpen} onClose={() => setDealerOpen(false)} />
          <SearchPopup isOpen={searchOpen} onClose={() => setSearchOpen(false)} />
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(React.createElement(App));
  </script>
</body>
</html>
